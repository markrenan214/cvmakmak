<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV BY MAKMAK</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #e9dcc9;
            --ink: #3d3028;
            --accent-rugged: #8b4513; /* Saddle Brown */
            --accent-leaf: #556b2f;   /* Dark Olive */
            --border-sepia: #bc9b6a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #2b231d;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--ink);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .form-wrapper { width: 100%; max-width: 750px; }

        .form-container {
            background-color: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            padding: 50px;
            border-radius: 2px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 100px rgba(139, 69, 19, 0.1);
            border: 1px solid var(--border-sepia);
            position: relative;
        }

        /* Compass Rose Decoration */
        .form-container::before {
            content: '✧';
            position: absolute;
            top: 20px; right: 20px;
            font-size: 40px;
            color: var(--border-sepia);
            opacity: 0.5;
        }

        .header-section {
            border-bottom: 2px solid var(--border-sepia);
            margin-bottom: 35px;
            padding-bottom: 15px;
        }

        h2 { 
            font-family: 'Special Elite', cursive; 
            font-size: 28px; 
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .sub-text { font-style: italic; font-size: 14px; opacity: 0.8; }

        .form-group { margin-bottom: 25px; display: flex; flex-direction: column; gap: 8px; }
        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        label { 
            font-weight: 700; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            color: var(--accent-rugged);
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: none;
            border-bottom: 1px solid var(--border-sepia);
            background: transparent;
            font-size: 15px;
            font-family: 'Special Elite', cursive;
            color: #2b231d;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-bottom: 2px solid var(--accent-rugged);
            background: rgba(255, 255, 255, 0.2);
        }

        textarea { min-height: 100px; border: 1px solid var(--border-sepia); padding: 15px; border-radius: 4px; }

        /* File Input Styling */
        input[type="file"] { border: none; font-size: 12px; }
        input[type="file"]::file-selector-button {
            background: var(--accent-rugged);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            margin-right: 15px;
            text-transform: uppercase;
        }

        .preview-box { margin-top: 15px; }
        #img-preview {
            display: none; width: 120px; height: 120px;
            object-fit: cover; border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transform: rotate(-2deg); /* Slightly skewed for "tacked on" look */
        }

        .submit-btn {
            width: 100%;
            background-color: var(--accent-leaf);
            color: white;
            border: none;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Special Elite', cursive;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #3d4b21;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background-color: #6a8239;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #3d4b21;
        }

        @media (max-width: 600px) { .grid-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="form-wrapper">
        <div class="form-container">
            <div class="header-section">
                <h2>FILL-UP CV</h2>
                <p class="sub-text">PAKI FILL-UP LANG HEHE</p>
            </div>
            
            <form action="generate.php" method="POST" enctype="multipart/form-data">
                
                <div class="form-group">
                    <label>PROFILE PHOTO</label>
                    <input type="file" name="profile_pic" id="profile_pic" accept="image/*" required>
                    <div class="preview-box">
                        <img id="img-preview" src="" alt="Preview">
                    </div>
                </div>

                <div class="form-group">
                    <label>FULL NAME</label>
                    <input type="text" name="fullname" placeholder="Enter Full Name..." required>
                </div>

                <div class="grid-row">
                    <div class="form-group">
                        <label>EMAIL ADDRESS</label>
                        <input type="email" name="email" placeholder="explorer@outpost.com" required>
                    </div>
                    <div class="form-group">
                        <label>PHONE/LANDLINE</label>
                        <input type="tel" name="phone" placeholder="+1 234 567..." required>
                    </div>
                </div>

                <div class="form-group">
                    <label>HOME ADDRESS</label>
                    <input type="text" name="address" placeholder="City, County" required>
                </div>

                <div class="form-group">
                    <label>BIO/SUMMARY</label>
                    <textarea name="summary" placeholder="Describe your experience in the field..." required></textarea>
                </div>

                <div class="form-group">
                    <label>EDUCATION</label>
                    <textarea name="education" placeholder="List academies and certifications..." required></textarea>
                </div>

                <div class="form-group">
                    <label>SKILLS</label>
                    <textarea name="skills" placeholder="Web dev. programming, troubleshooting" required></textarea>
                </div>

                <button type="submit" class="submit-btn">GENERATE</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
